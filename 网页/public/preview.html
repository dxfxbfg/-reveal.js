<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预览幻灯片 - SlideGen</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* 预览页特定的内联样式 */
      .preview-page {
        background: #0f0f13;
        min-height: 100vh;
      }

      /* 预览页特有的样式调整 */
      .main-container {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
      }

      /* 编辑器代码特殊字体 */
      .editor-textarea {
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
        font-size: 13px;
        tab-size: 2;
      }
    </style>
  </head>
  <body class="preview-page">
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="logo">&#x1f3ad;</span>
        <h2 id="slideTitle">幻灯片预览</h2>
        <span id="aiBadge" class="badge"></span>
      </div>
      <div class="toolbar-actions">
        <div class="view-toggle">
          <button id="viewPreview" class="active" onclick="setView('preview')">
            &#x1f441; 预览
          </button>
          <button id="viewSplit" onclick="setView('split')">&#x25f1; 分屏</button>
          <button id="viewEditor" onclick="setView('editor')">&#x1f4dd; 编辑</button>
        </div>
        <button class="btn btn-secondary" onclick="goBack()">&#x2190; 返回编辑</button>
        <button class="btn btn-secondary" onclick="openFullscreen()">&#x26f6; 全屏演示</button>
        <button class="btn btn-secondary" onclick="copyCode()">&#x1f4cb; 复制代码</button>
        <button class="btn btn-primary" onclick="downloadHTML()">&#x2b07; 下载 HTML</button>
        <button class="btn btn-primary" onclick="exportPDF()">&#x1f5a8; 导出 PDF</button>
      </div>
    </div>

    <div class="main-container" id="mainContainer">
      <div class="preview-container" id="previewContainer">
        <div class="empty-state">
          <h3>加载中...</h3>
        </div>
      </div>

      <div class="editor-container" id="editorContainer">
        <div class="editor-header">
          <span><span class="status-indicator saved" id="statusIndicator"></span>HTML 代码</span>
          <div class="editor-actions">
            <button class="btn btn-secondary" onclick="formatCode()">&#x1f3b4; 格式化</button>
            <button class="btn btn-secondary" onclick="undoEdit()">&#x21a9; 撤销</button>
            <button class="btn btn-primary" onclick="updatePreview()">&#x1f504; 更新预览</button>
          </div>
        </div>
        <textarea class="editor-textarea" id="codeEditor" spellcheck="false"></textarea>
      </div>
    </div>

    <div class="slide-info" id="slideInfo"></div>
    <div class="toast" id="toast"></div>
    <div class="kbd-hints">
      <kbd>&#x2192;</kbd> 下一页 &nbsp; <kbd>&#x2190;</kbd> 上一页<br />
      <kbd>F</kbd> 全屏 &nbsp; <kbd>O</kbd> 总览 &nbsp; <kbd>S</kbd> 备注<br />
      <kbd>Ctrl+S</kbd> 更新预览 &nbsp; <kbd>Ctrl+Shift+F</kbd> 格式化
    </div>

    <script>
      let slideHTML = '';
      let slideTitle = '未命名幻灯片';
      let isAI = false;
      let currentView = 'preview';
      let editHistory = [];
      let editHistoryIndex = -1;
      let autoUpdateTimer = null;
      let hasUnsavedChanges = false;

      function init() {
        const params = new URLSearchParams(window.location.search);
        const encodedHTML = params.get('html');
        slideTitle = decodeURIComponent(params.get('title') || '未命名幻灯片');
        isAI = params.get('ai') === '1';
        const model = params.get('model') || '';

        document.getElementById('slideTitle').textContent = slideTitle;

        const badgeEl = document.getElementById('aiBadge');
        if (isAI) {
          badgeEl.textContent = '&#x2713; AI (' + model + ')';
          badgeEl.className = 'badge ai';
        } else {
          badgeEl.textContent = '&#x26a0; 基础模板';
          badgeEl.className = 'badge fallback';
        }

        if (!encodedHTML) {
          document.getElementById('previewContainer').innerHTML = `
          <div class="empty-state">
            <h3>没有可预览的幻灯片</h3>
            <button class="btn btn-primary" onclick="goBack()" style="margin-top:16px">去创建</button>
          </div>`;
          return;
        }

        slideHTML = decodeURIComponent(encodedHTML);
        document.getElementById('codeEditor').value = slideHTML;

        updatePreview();
        saveToHistory();

        const sectionCount = (slideHTML.match(/<section/g) || []).length;
        document.getElementById('slideInfo').textContent =
          `共 ${sectionCount} 页 &#x00b7; reveal.js v5`;

        // 编辑器自动更新（防抖）
        const editor = document.getElementById('codeEditor');
        editor.addEventListener('input', () => {
          hasUnsavedChanges = true;
          updateStatusIndicator('unsaved');
          clearTimeout(autoUpdateTimer);
          autoUpdateTimer = setTimeout(() => {
            updatePreview();
            saveToHistory();
          }, 1000);
        });

        // Ctrl+S 快捷键
        document.addEventListener('keydown', e => {
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            updatePreview();
            saveToHistory();
            showToast('&#x2705; 预览已更新');
          }
        });
      }

      function updatePreview() {
        const editor = document.getElementById('codeEditor');
        slideHTML = editor.value;
        hasUnsavedChanges = false;
        updateStatusIndicator('saved');

        const iframe = document.getElementById('slideFrame');
        if (iframe) {
          iframe.srcdoc = slideHTML;
        } else {
          const container = document.getElementById('previewContainer');
          container.innerHTML = '';
          const newIframe = document.createElement('iframe');
          newIframe.id = 'slideFrame';
          newIframe.srcdoc = slideHTML;
          container.appendChild(newIframe);
        }

        const sectionCount = (slideHTML.match(/<section/g) || []).length;
        document.getElementById('slideInfo').textContent =
          `共 ${sectionCount} 页 &#x00b7; reveal.js v5`;
      }

      function setView(view) {
        currentView = view;
        const container = document.getElementById('mainContainer');
        container.className = 'main-container';

        const btnPreview = document.getElementById('viewPreview');
        const btnSplit = document.getElementById('viewSplit');
        const btnEditor = document.getElementById('viewEditor');

        [btnPreview, btnSplit, btnEditor].forEach(btn => btn.classList.remove('active'));

        switch (view) {
          case 'preview':
            container.classList.remove('split-view', 'editor-only');
            btnPreview.classList.add('active');
            document.getElementById('editorContainer').classList.remove('active');
            break;
          case 'split':
            container.classList.add('split-view');
            btnSplit.classList.add('active');
            document.getElementById('editorContainer').classList.add('active');
            break;
          case 'editor':
            container.classList.add('editor-only');
            btnEditor.classList.add('active');
            document.getElementById('editorContainer').classList.add('active');
            break;
        }
      }

      function updateStatusIndicator(status) {
        const indicator = document.getElementById('statusIndicator');
        indicator.className = 'status-indicator ' + status;
      }

      function saveToHistory() {
        const editor = document.getElementById('codeEditor');
        const value = editor.value;

        if (editHistoryIndex < editHistory.length - 1) {
          editHistory = editHistory.slice(0, editHistoryIndex + 1);
        }
        editHistory.push(value);
        if (editHistory.length > 50) editHistory.shift();
        editHistoryIndex = editHistory.length - 1;
      }

      function undoEdit() {
        if (editHistoryIndex > 0) {
          editHistoryIndex--;
          document.getElementById('codeEditor').value = editHistory[editHistoryIndex];
          updatePreview();
          showToast('&#x21a9; 已撤销');
        }
      }

      function formatCode() {
        const editor = document.getElementById('codeEditor');
        let code = editor.value;

        const indent = '  ';
        let formatted = '';
        let indentLevel = 0;
        const lines = code.replace(/>\s*</g, '>\n<').split('\n');

        lines.forEach(line => {
          line = line.trim();
          if (!line) return;

          if (line.match(/^<\/(section|div|html|head|body|script|style)/i)) {
            indentLevel = Math.max(0, indentLevel - 1);
          }

          formatted += indent.repeat(indentLevel) + line + '\n';

          if (
            line.match(/^<(section|div|html|head|body|script|style|ul|li)/i) &&
            !line.match(/<\/.*>$/)
          ) {
            indentLevel++;
          }
        });

        editor.value = formatted.trim();
        updatePreview();
        showToast('&#x1f3b4; 代码已格式化');
      }

      function goBack() {
        window.location.href = '/';
      }

      function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
      }

      function downloadHTML() {
        if (!slideHTML) return;
        const blob = new Blob([slideHTML], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (slideTitle.replace(/[^\w\u4e00-\u9fa5]/g, '_') || 'slide') + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('&#x2705; HTML 已下载');
      }

      function copyCode() {
        const code = document.getElementById('codeEditor').value;
        if (!code) return;
        navigator.clipboard
          .writeText(code)
          .then(() => {
            showToast('&#x1f4cb; 代码已复制到剪贴板');
          })
          .catch(() => {
            document.getElementById('codeEditor').select();
            document.execCommand('copy');
            showToast('&#x1f4cb; 代码已复制');
          });
      }

      function openFullscreen() {
        const iframe = document.querySelector('#slideFrame');
        if (!iframe) return;
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) {
          iframe.webkitRequestFullscreen();
        }
      }

      function exportPDF() {
        if (!slideHTML) return;
        const printHtml = slideHTML.replace(
          '</head>',
          '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/css/print/pdf.css" media="print">' +
            '<script>window.onload=function(){setTimeout(function(){window.print()},800)}<\/script></head>'
        );
        const printWindow = window.open('', '_blank');
        printWindow.document.write(printHtml);
        printWindow.document.close();
        showToast('&#x1f5a8; 请使用浏览器打印功能保存为 PDF');
      }

      init();
    </script>
  </body>
</html>
