<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlideGen - AI 幻灯片生成器</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* 主页特定的内联样式 */
      .home-container {
        max-width: 720px;
        width: 100%;
        text-align: center;
      }

      /* 键盘快捷键提示 */
      .keyboard-hint {
        font-size: 0.75rem;
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="home-page">
      <div class="home-container">
        <div class="logo">🎭</div>
        <h1>SlideGen</h1>
        <p class="subtitle">描述你想要的幻灯片，AI 为你生成 reveal.js 演示文稿</p>

        <div class="input-area">
          <textarea
            id="prompt"
            placeholder="描述你想做的幻灯片，例如：&#10;&#10;• 人工智能发展历程，包含5页，从图灵测试到大语言模型&#10;• Python 入门教程，8页，涵盖基础语法、数据结构、函数式编程&#10;• 公司季度汇报，Q3业绩亮点和下季度计划"
          ></textarea>
          <div class="char-count"><span id="charCount">0</span> 字</div>

          <div class="options">
            <div class="option-group">
              <label>主题</label>
              <select id="theme">
                <option value="black">暗黑</option>
                <option value="white">亮白</option>
                <option value="moon">月光</option>
                <option value="night">夜空</option>
                <option value="dracula">Dracula</option>
                <option value="sky">天空</option>
                <option value="blood">赤红</option>
                <option value="beige">米色</option>
                <option value="league">联盟</option>
                <option value="serif">衬线</option>
                <option value="solarized">Solarized</option>
              </select>
            </div>
            <div class="option-group">
              <label>动画</label>
              <select id="transition">
                <option value="slide">滑动</option>
                <option value="fade">淡入淡出</option>
                <option value="zoom">缩放</option>
                <option value="convex">凸面</option>
                <option value="concave">凹面</option>
                <option value="none">无</option>
              </select>
            </div>
            <div class="option-group">
              <label>页数</label>
              <select id="pages">
                <option value="3">3 页</option>
                <option value="5" selected>5 页</option>
                <option value="8">8 页</option>
                <option value="10">10 页</option>
                <option value="12">12 页</option>
                <option value="15">15 页</option>
                <option value="20">20 页</option>
              </select>
            </div>
            <div class="option-group">
              <label>模型</label>
              <select id="model">
                <option value="glm-4-flash" selected>GLM-4 Flash（快）</option>
                <option value="glm-4-air">GLM-4 Air</option>
                <option value="glm-4">GLM-4 标准</option>
                <option value="glm-4-plus">GLM-4 Plus（强）</option>
              </select>
            </div>
            <div class="option-group">
              <label>模式</label>
              <select id="mode">
                <option value="code" selected>AI 生成代码</option>
                <option value="json">结构化内容</option>
              </select>
            </div>
          </div>
        </div>

        <button class="primary-btn" id="generateBtn" onclick="generate()">✨ 生成幻灯片</button>
        <p class="keyboard-hint">💡 提示：在文本框中按 Ctrl+Enter 快速生成</p>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p class="loading-text">AI 正在创作中...</p>
          <p class="loading-model" id="loadingModel"></p>
        </div>

        <div class="status-msg" id="statusMsg"></div>

        <div class="examples">
          <h3>💡 示例提示词</h3>
          <span class="example-tag" onclick="setPrompt(this)">人工智能发展历程：从图灵到 GPT</span>
          <span class="example-tag" onclick="setPrompt(this)">Python 编程入门教程</span>
          <span class="example-tag" onclick="setPrompt(this)">2024 年度工作总结报告</span>
          <span class="example-tag" onclick="setPrompt(this)">新产品发布会演示方案</span>
          <span class="example-tag" onclick="setPrompt(this)">气候变化与可持续发展</span>
          <span class="example-tag" onclick="setPrompt(this)">《三体》读书分享会</span>
          <span class="example-tag" onclick="setPrompt(this)">创业项目路演 PPT</span>
          <span class="example-tag" onclick="setPrompt(this)">机器学习算法入门</span>
        </div>

        <div class="footer">Powered by 智谱 AI · Built with reveal.js v5</div>
      </div>
    </div>

    <script>
      const promptEl = document.getElementById('prompt');
      const charCountEl = document.getElementById('charCount');

      // 字数统计
      promptEl.addEventListener('input', () => {
        charCountEl.textContent = promptEl.value.length;
      });

      function setPrompt(el) {
        promptEl.value = el.textContent;
        charCountEl.textContent = promptEl.value.length;
        promptEl.focus();
      }

      function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.className = 'status-msg ' + type;
      }

      function clearStatus() {
        const el = document.getElementById('statusMsg');
        el.className = 'status-msg';
        el.textContent = '';
      }

      async function generate() {
        const prompt = promptEl.value.trim();
        if (!prompt) {
          showStatus('❌ 请输入幻灯片描述', 'error');
          promptEl.focus();
          return;
        }

        const btn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const modelSelect = document.getElementById('model');

        btn.disabled = true;
        loading.classList.add('active');
        clearStatus();

        const modelName = modelSelect.options[modelSelect.selectedIndex].text;
        document.getElementById('loadingModel').textContent = '使用模型：' + modelName;

        try {
          const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt,
              theme: document.getElementById('theme').value,
              transition: document.getElementById('transition').value,
              pages: parseInt(document.getElementById('pages').value),
              model: document.getElementById('model').value,
              mode: document.getElementById('mode').value,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || `服务器错误 (${res.status})`);
          }

          // 显示状态信息
          if (data.warning) {
            showStatus('⚠️ ' + data.warning, 'warning');
          } else if (data.ai) {
            showStatus(`✅ 已由 ${data.model} 生成 · 共 ${data.pages} 页`, 'success');
          }

          // 跳转到预览页
          const params = new URLSearchParams({
            html: encodeURIComponent(data.html),
            title: encodeURIComponent(data.title || '未命名幻灯片'),
            ai: data.ai ? '1' : '0',
            model: data.model || '',
          });
          window.location.href = '/preview.html?' + params.toString();
        } catch (err) {
          showStatus('❌ ' + err.message, 'error');
          btn.disabled = false;
          loading.classList.remove('active');
        }
      }

      // 支持 Ctrl+Enter 快捷键
      promptEl.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          generate();
        }
      });
    </script>
  </body>
</html>
