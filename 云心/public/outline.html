<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>编辑大纲 — 云心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-warm: #f5f0e8;
      --surface: rgba(255,255,255,0.85);
      --surface-hover: rgba(255,255,255,0.95);
      --border: rgba(139,119,101,0.12);
      --border-hover: rgba(139,119,101,0.22);
      --text: #2c2420;
      --text-secondary: #6b5d52;
      --text-muted: #a09488;
      --accent: #c4956a;
      --accent-soft: #d4b896;
      --accent-light: #e8d5c0;
      --accent-glow: rgba(196,149,106,0.15);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow-soft: 0 4px 24px rgba(44,36,32,0.06);
      --shadow-medium: 0 8px 40px rgba(44,36,32,0.1);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(196,149,106,0.2);
      color: var(--text);
    }

    /* ========== NAVIGATION ========== */
    .nav {
      position: fixed;
      top:0; left:0; right:0;
      height: 64px;
      background: rgba(250,249,247,0.8);
      backdrop-filter: blur(24px) saturate(1.2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
      transition: all 0.3s ease;
    }

    .nav.scrolled {
      background: rgba(250,249,247,0.95);
      box-shadow: var(--shadow-soft);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .nav-brand {
      font-family: 'Noto Serif SC', serif;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
    }

    .nav-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      cursor: pointer;
      border: none;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.7);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.9);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .btn-primary:hover::after {
      transform: translateX(100%);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(196,149,106,0.25);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ========== MAIN CONTENT ========== */
    .main {
      max-width: 820px;
      margin: 0 auto;
      padding: 96px 28px 80px;
    }

    .page-header {
      margin-bottom: 36px;
    }

    .page-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .page-title .gradient {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* ========== TITLE INPUT ========== */
    .title-input-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .title-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 700;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Noto Serif SC', serif;
      letter-spacing: 0.02em;
    }

    .title-input:focus {
      border-color: var(--accent-soft);
      box-shadow: 0 0 0 4px var(--accent-glow);
      background: var(--surface-hover);
    }

    .title-input::placeholder {
      color: #c0b8a8;
      font-weight: 400;
    }

    /* ========== SLIDE LIST ========== */
    .slide-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slide-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      cursor: grab;
      position: relative;
      overflow: hidden;
    }

    .slide-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--accent), var(--accent-soft));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .slide-item:hover {
      border-color: rgba(196,149,106,0.2);
      box-shadow: var(--shadow-soft);
      transform: translateY(-2px);
    }

    .slide-item:hover::before {
      opacity: 0.6;
    }

    .slide-item.dragging {
      opacity: 0.35;
      border: 1.5px dashed var(--accent);
      transform: scale(0.98);
    }

    .slide-item.over {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
      transform: translateY(4px);
    }

    .drag-handle {
      width: 24px; height: 24px;
      color: var(--text-muted);
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      flex-shrink: 0;
      font-size: 1.1rem;
      transition: color 0.2s ease;
    }

    .slide-item:hover .drag-handle {
      color: var(--accent);
    }

    .slide-number {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 4px;
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .slide-body {
      flex: 1;
      min-width: 0;
    }

    .slide-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .slide-type {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      font-family: inherit;
    }

    .slide-type.title { background: rgba(196,149,106,0.12); color: #9a7048; }
    .slide-type.section { background: rgba(90,170,128,0.1); color: #3a8a60; }
    .slide-type.content { background: rgba(100,160,200,0.1); color: #3a7aa0; }
    .slide-type.cards { background: rgba(200,160,80,0.1); color: #8a7030; }
    .slide-type.two-col { background: rgba(200,100,100,0.1); color: #a05050; }
    .slide-type.quote { background: rgba(160,120,180,0.1); color: #7a5090; }
    .slide-type.code { background: rgba(80,160,160,0.1); color: #208888; }
    .slide-type.end { background: rgba(140,140,150,0.1); color: #606070; }

    .slide-title-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      padding: 4px 0;
      min-width: 100px;
      font-family: inherit;
      transition: border-color 0.25s ease;
    }

    .slide-title-input:focus {
      border-bottom-color: var(--accent-soft);
    }

    .slide-title-input::placeholder {
      color: #c0b8a8;
      font-weight: 400;
    }

    .slide-content-area {
      width: 100%;
      background: rgba(255,255,255,0.5);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.86rem;
      outline: none;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
      line-height: 1.7;
      transition: all 0.25s ease;
      font-weight: 400;
    }

    .slide-content-area:focus {
      border-color: rgba(196,149,106,0.25);
      background: rgba(255,255,255,0.7);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .slide-content-area::placeholder {
      color: #c0b8a8;
    }

    .slide-notes {
      margin-top: 8px;
    }

    .slide-notes input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      outline: none;
      padding: 4px 0;
      font-family: inherit;
      transition: border-color 0.25s ease;
      font-weight: 400;
    }

    .slide-notes input:focus {
      border-bottom-color: rgba(196,149,106,0.2);
      color: var(--text-secondary);
    }

    .slide-notes input::placeholder {
      color: #c0b8a8;
    }

    .slide-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .slide-item:hover .slide-actions {
      opacity: 1;
    }

    .slide-actions button {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .slide-actions button:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.9);
      transform: scale(1.1);
    }

    .slide-actions button.delete:hover {
      background: rgba(220,100,100,0.08);
      color: #c85555;
      border-color: rgba(220,100,100,0.2);
    }

    /* ========== ADD SLIDE ========== */
    .add-slide {
      margin-top: 14px;
      width: 100%;
      padding: 16px;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.92rem;
      transition: all 0.3s ease;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .add-slide:hover {
      border-color: var(--accent-soft);
      color: var(--accent);
      background: rgba(196,149,106,0.04);
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    /* ========== OVERLAY ========== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(250,249,247,0.94);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 200;
    }

    .overlay.active {
      display: flex;
    }

    .overlay .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(196,149,106,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .overlay p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* ========== EMPTY STATE ========== */
    .empty {
      text-align: center;
      padding: 100px 24px;
      color: var(--text-secondary);
    }

    .empty p {
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    .empty .empty-hint {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .empty button {
      padding: 12px 28px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .empty button:hover {
      border-color: var(--accent-soft);
      background: rgba(196,149,106,0.04);
      transform: translateY(-1px);
    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139,119,101,0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139,119,101,0.35);
    }

    /* ========== MOBILE ========== */
    @media (max-width: 640px) {
      .main {
        padding: 84px 16px 40px;
      }
      .nav {
        padding: 0 16px;
      }
      .slide-actions {
        opacity: 1;
      }
      .slide-item {
        padding: 16px;
        gap: 10px;
      }
      .page-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="nav" id="navbar">
    <div class="nav-left">
      <div class="nav-logo">☁️</div>
      <span class="nav-brand">云心</span>
    </div>
    <div class="nav-right">
      <button class="btn btn-secondary" onclick="goBack()">← 返回</button>
      <button class="btn btn-primary" id="genBtn" onclick="generateSlides()">✨ 生成幻灯片</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty" id="empty">
      <p>暂无大纲数据</p>
      <div class="empty-hint">请先返回首页生成大纲</div>
      <button onclick="goBack()">返回首页</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <p>AI 正在生成幻灯片...</p>
  </div>

  <script>
    let outline = null, prompt = '', mode = 'code';
    let dragSrcEl = null;

    function init() {
      const stored = localStorage.getItem('slidegen_outline');
      prompt = localStorage.getItem('slidegen_prompt') || '';
      mode = localStorage.getItem('slidegen_mode') || 'code';
      if (stored) { try { outline = JSON.parse(stored); } catch(e) {} }
      if (!outline || !outline.slides) {
        document.getElementById('empty').style.display = 'block';
        return;
      }
      document.getElementById('empty').style.display = 'none';
      renderEditor();
    }

    function renderEditor() {
      const main = document.getElementById('main');
      let html = '';
      html += `<div class="page-header">`;
      html += `<div class="page-title">编辑<span class="gradient">大纲</span></div>`;
      html += `<div class="page-subtitle">拖拽排序、编辑内容，确认后生成精美幻灯片</div>`;
      html += `</div>`;
      html += `<div class="title-input-wrap">`;
      html += `<input class="title-input" id="outlineTitle" value="${escapeHtml(outline.title || '')}" placeholder="演示文稿标题">`;
      html += `</div>`;
      html += `<div class="slide-list" id="slideList">`;
      outline.slides.forEach((slide, idx) => { html += renderSlideItem(slide, idx); });
      html += `</div>`;
      html += `<button class="add-slide" onclick="addSlide()">+ 添加新页面</button>`;
      main.innerHTML = html;
      setupDragAndDrop();
    }

    function renderSlideItem(slide, idx) {
      const typeLabels = { title: '封面', section: '章节', content: '内容', cards: '卡片', 'two-col': '双列', quote: '引用', code: '代码', end: '结束' };
      const contentStr = Array.isArray(slide.content)
        ? slide.content.map(c => typeof c === 'string' ? c : JSON.stringify(c)).join('\n')
        : (typeof slide.content === 'object' ? JSON.stringify(slide.content) : String(slide.content || ''));
      return `
        <div class="slide-item" data-index="${idx}" draggable="true">
          <div class="drag-handle">⋮⋮</div>
          <div class="slide-number">${idx + 1}</div>
          <div class="slide-body">
            <div class="slide-header">
              <span class="slide-type ${slide.type}">${typeLabels[slide.type] || slide.type}</span>
              <input class="slide-title-input" value="${escapeHtml(slide.title || '')}" placeholder="页面标题" onchange="updateSlide(${idx}, 'title', this.value)">
            </div>
            <textarea class="slide-content-area" placeholder="内容要点，每行一条" onchange="updateSlide(${idx}, 'content', this.value)">${escapeHtml(contentStr)}</textarea>
            <div class="slide-notes">
              <input value="${escapeHtml(slide.notes || '')}" placeholder="演讲者备注（可选）" onchange="updateSlide(${idx}, 'notes', this.value)">
            </div>
          </div>
          <div class="slide-actions">
            <button onclick="moveSlide(${idx}, -1)" title="上移">↑</button>
            <button onclick="moveSlide(${idx}, 1)" title="下移">↓</button>
            <button class="delete" onclick="deleteSlide(${idx})" title="删除">×</button>
          </div>
        </div>
      `;
    }

    function setupDragAndDrop() {
      const items = document.querySelectorAll('.slide-item');
      items.forEach(item => {
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragenter', handleDragEnter);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('dragleave', handleDragLeave);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);
      });
    }

    function handleDragStart(e) {
      dragSrcEl = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/html', this.innerHTML);
    }
    function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
    function handleDragEnter() { this.classList.add('over'); }
    function handleDragLeave() { this.classList.remove('over'); }
    function handleDrop(e) {
      if (e.stopPropagation) e.stopPropagation();
      if (dragSrcEl !== this) {
        const srcIdx = parseInt(dragSrcEl.dataset.index);
        const dstIdx = parseInt(this.dataset.index);
        const [removed] = outline.slides.splice(srcIdx, 1);
        outline.slides.splice(dstIdx, 0, removed);
        renderEditor();
      }
      return false;
    }
    function handleDragEnd() {
      this.classList.remove('dragging');
      document.querySelectorAll('.slide-item').forEach(item => item.classList.remove('over'));
    }

    function updateSlide(idx, field, value) {
      if (!outline.slides[idx]) return;
      if (field === 'content') {
        try { outline.slides[idx][field] = JSON.parse(value); }
        catch(e) { outline.slides[idx][field] = value.split('\n').filter(l => l.trim()); }
      } else { outline.slides[idx][field] = value; }
      if (field === 'title' && idx === 0) outline.title = value;
    }
    function moveSlide(idx, dir) {
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= outline.slides.length) return;
      [outline.slides[idx], outline.slides[newIdx]] = [outline.slides[newIdx], outline.slides[idx]];
      renderEditor();
    }
    function deleteSlide(idx) {
      if (outline.slides.length <= 2) { alert('至少需要保留 2 页'); return; }
      outline.slides.splice(idx, 1);
      renderEditor();
    }
    function addSlide() {
      outline.slides.splice(outline.slides.length - 1, 0, {
        type: 'content', title: '新页面', content: ['要点一', '要点二'], notes: ''
      });
      renderEditor();
    }
    function escapeHtml(text) {
      return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 带超时的 fetch 封装
    async function fetchWithTimeout(url, options = {}, timeoutMs = 300000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeoutId);
        return res;
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
          throw new Error('请求超时，AI 生成时间较长，请稍后重试');
        }
        throw err;
      }
    }

    async function safeJson(res) {
      const text = await res.text();
      // 如果响应本身不是 JSON 内容类型，记录日志
      const contentType = res.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) {
        console.warn('服务器返回非 JSON 内容类型:', contentType, '状态码:', res.status);
      }
      try {
        return JSON.parse(text);
      } catch (e) {
        console.error('JSON 解析失败，原始响应:', text.slice(0, 1000));
        // 尝试从 HTML 错误页面中提取标题
        const titleMatch = text.match(/<title>(.*?)<\/title>/i);
        const h1Match = text.match(/<h1[^>]*>(.*?)<\/h1>/i);
        const errorHint = titleMatch?.[1] || h1Match?.[1] || '';
        if (errorHint && errorHint.toLowerCase().includes('error')) {
          throw new Error(`服务器错误: ${errorHint}`);
        }
        throw new Error('服务器返回了非 JSON 数据，可能是服务暂时不可用，请稍后重试');
      }
    }

    async function generateSlides() {
      const titleInput = document.getElementById('outlineTitle');
      if (titleInput) outline.title = titleInput.value;
      document.getElementById('overlay').classList.add('active');
      document.getElementById('genBtn').disabled = true;

      try {
        const res = await fetchWithTimeout('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, outline, mode }),
        }, 300000); // 5分钟超时，给 AI 充足时间

        const data = await safeJson(res);

        if (!res.ok || !data.success) {
          throw new Error(data.error || `服务器错误 (${res.status})`);
        }

        // 检查 HTML 内容
        if (!data.html || !data.html.trim()) {
          throw new Error('服务器返回了空的幻灯片内容');
        }

        const params = new URLSearchParams({
          html: encodeURIComponent(data.html),
          title: encodeURIComponent(data.title || outline.title || '未命名幻灯片'),
          ai: data.ai ? '1' : '0',
          model: data.model || '',
        });
        window.location.href = '/preview.html?' + params.toString();
      } catch (err) {
        console.error('生成幻灯片失败:', err);
        // 更友好的错误提示
        let errorMsg = err.message;
        if (errorMsg.includes('fetch') || errorMsg.includes('network')) {
          errorMsg = '网络连接失败，请检查网络后重试';
        } else if (errorMsg.includes('timeout') || errorMsg.includes('超时')) {
          errorMsg = 'AI 生成时间较长，已超时。建议减少页数或简化描述后重试';
        }
        alert('生成失败：' + errorMsg);
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('genBtn').disabled = false;
      }
    }
    function goBack() { window.location.href = '/'; }

    // Nav scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 20) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

    init();
  </script>
</body>
</html>
