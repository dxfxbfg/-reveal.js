<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 云心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-warm: #f5f0e8;
      --surface: rgba(255,255,255,0.85);
      --surface-hover: rgba(255,255,255,0.95);
      --border: rgba(139,119,101,0.12);
      --border-hover: rgba(139,119,101,0.22);
      --text: #2c2420;
      --text-secondary: #6b5d52;
      --text-muted: #a09488;
      --accent: #c4956a;
      --accent-soft: #d4b896;
      --accent-light: #e8d5c0;
      --accent-glow: rgba(196,149,106,0.15);
      --radius: 24px;
      --radius-sm: 14px;
      --shadow-soft: 0 4px 24px rgba(44,36,32,0.06);
      --shadow-medium: 0 8px 40px rgba(44,36,32,0.1);
      --shadow-glow: 0 0 60px rgba(196,149,106,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: rgba(196,149,106,0.2);
      color: var(--text);
    }

    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: orbFloat 25s ease-in-out infinite;
    }

    .ambient-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--accent-light), transparent 70%);
      top: -15%; left: -10%;
      animation-delay: 0s;
    }

    .ambient-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(200,180,220,0.3), transparent 70%);
      bottom: 5%; right: -8%;
      animation-delay: -8s;
      animation-duration: 30s;
    }

    .ambient-orb:nth-child(3) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(180,200,220,0.25), transparent 70%);
      top: 45%; left: 35%;
      animation-delay: -15s;
      animation-duration: 22s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 0 24px;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow-medium);
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-radius: 18px;
      box-shadow: 0 4px 16px var(--accent-glow);
      margin-bottom: 16px;
    }

    .brand-logo svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .brand h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .brand p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 18px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      color: white;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(196,149,106,0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .alert-error {
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.2);
      color: #dc2626;
    }

    .alert-success {
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid rgba(22, 163, 74, 0.2);
      color: #16a34a;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>

<div class="ambient-bg">
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
</div>

<div class="container">
  <div class="card">
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      返回首页
    </a>

    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>欢迎回来</h1>
      <p>登录云心，继续创作</p>
    </div>

    <div id="alert-error" class="alert alert-error"></div>
    <div id="alert-success" class="alert alert-success"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="输入密码" required autocomplete="current-password" />
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">
        登录
      </button>
    </form>

    <div class="footer">
      还没有账号？<a href="register.html">立即注册</a>
    </div>
  </div>
</div>

<script>
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const alertErr = document.getElementById('alert-error');
    const alertSuc = document.getElementById('alert-success');
    alertErr.style.display = 'none';
    alertSuc.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>登录中...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (data.success) {
        alertSuc.textContent = '登录成功！即将跳转...';
        alertSuc.style.display = 'block';
        localStorage.setItem('yunxin_token', data.token);
        localStorage.setItem('yunxin_user', JSON.stringify(data.user));
        setTimeout(() => window.location.href = '/', 1200);
      } else {
        alertErr.textContent = data.error || '登录失败，请稍后重试';
        alertErr.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
      }
    } catch (err) {
      alertErr.textContent = '网络错误，请检查网络连接';
      alertErr.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '登录';
    }
  }
</script>

</body>
</html>
