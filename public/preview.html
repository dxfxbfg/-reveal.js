<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预览 — 云心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --surface: rgba(255,255,255,0.85);
      --border: rgba(139,119,101,0.12);
      --text: #2c2420;
      --text-secondary: #6b5d52;
      --accent: #c4956a;
      --accent-soft: #d4b896;
      --accent-glow: rgba(196,149,106,0.15);
      --radius: 14px;
      --shadow-soft: 0 4px 24px rgba(44,36,32,0.06);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(196,149,106,0.2);
      color: var(--text);
    }

    /* ========== FLOATING TOOLBAR ========== */
    .toolbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      height: 48px;
      background: rgba(250,249,247,0.65);
      backdrop-filter: blur(28px) saturate(1.8);
      -webkit-backdrop-filter: blur(28px) saturate(1.8);
      border: 1px solid rgba(139,119,101,0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(44,36,32,0.07), 0 2px 8px rgba(44,36,32,0.04);
      white-space: nowrap;
    }

    /* Logo + title cluster */
    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px 0 2px;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .toolbar-logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px var(--accent-glow);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .toolbar-logo::after {
      content: '';
      position: absolute;
      width: 10px; height: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 3px;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
    }
    .toolbar-logo::before {
      content: '';
      position: absolute;
      width: 16px; height: 8px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(1px);
    }

    .toolbar-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-badge {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .toolbar-badge.ai {
      background: rgba(90,170,128,0.15);
      color: #3a8a60;
      border: 1px solid rgba(90,170,128,0.25);
    }

    .toolbar-badge.fallback {
      background: rgba(200,160,80,0.1);
      color: #8a7030;
      border: 1px solid rgba(200,160,80,0.2);
    }

    /* Divider */
    .toolbar-sep {
      width: 1px;
      height: 22px;
      background: rgba(139,119,101,0.15);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ===== CIRCULAR ICON BUTTONS ===== */
    .tbtn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      flex-shrink: 0;
      font-family: inherit;
    }

    /* Ghost circle — transparent bg */
    .tbtn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .tbtn-ghost:hover {
      background: rgba(139,119,101,0.1);
      color: var(--text);
      transform: scale(1.1);
    }
    .tbtn-ghost:active {
      transform: scale(0.95);
    }

    /* Outline circle */
    .tbtn-outline {
      background: rgba(255,255,255,0.7);
      color: var(--text-secondary);
      border: 1px solid rgba(139,119,101,0.18);
      box-shadow: 0 2px 8px rgba(44,36,32,0.04);
    }
    .tbtn-outline:hover {
      background: #fff;
      color: var(--text);
      border-color: rgba(139,119,101,0.3);
      box-shadow: 0 4px 16px rgba(44,36,32,0.1);
      transform: scale(1.1) translateY(-1px);
    }
    .tbtn-outline:active {
      transform: scale(0.95);
    }

    /* Solid accent circle */
    .tbtn-solid {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fff;
      border: none;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    .tbtn-solid:hover {
      box-shadow: 0 6px 24px rgba(196,149,106,0.4);
      transform: scale(1.12) translateY(-2px);
    }
    .tbtn-solid:active {
      transform: scale(0.95);
    }

    /* View-toggle group: three small circles */
    .view-group {
      display: flex;
      align-items: center;
      gap: 3px;
      background: rgba(139,119,101,0.07);
      border-radius: 20px;
      padding: 4px 6px;
    }

    .vbtn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0;
    }

    .vbtn.active {
      background: #fff;
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(196,149,106,0.2);
    }

    .vbtn:hover:not(.active) {
      background: rgba(255,255,255,0.6);
      color: var(--text-secondary);
      transform: scale(1.1);
    }

    /* SVG icon base */
    .ti {
      width: 15px; height: 15px;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke: currentColor;
      flex-shrink: 0;
    }

    /* Arrow icon animations */
    @keyframes arrowLeft {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-3px); }
    }
    @keyframes arrowRight {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(3px); }
    }
    @keyframes arrowDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(3px); }
    }
    .tbtn-ghost:hover .ti-arrow-left { animation: arrowLeft 0.6s ease-in-out infinite; }
    .tbtn-outline:hover .ti-arrow-right { animation: arrowRight 0.5s ease-in-out infinite; }
    .tbtn-solid:hover .ti-arrow-down { animation: arrowDown 0.5s ease-in-out infinite; }

    /* Refresh spin */
    @keyframes spin360 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .tbtn-solid:hover .ti-refresh { animation: spin360 0.7s ease-in-out; transform-origin: center; }

    /* Dot pulse for view buttons */
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.4); opacity: 1; }
    }
    .vbtn.active .dot { animation: dotPulse 2s ease-in-out infinite; }
    .vbtn.active .dot:nth-child(2) { animation-delay: 0.15s; }
    .vbtn.active .dot:nth-child(3) { animation-delay: 0.3s; }

    /* ========== WORKSPACE ========== */
    .workspace {
      position: fixed;
      top: 84px; left: 0; right: 0; bottom: 0;
      display: flex;
    }

    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f0ece5;
    }

    .preview-panel iframe {
      width: 100%; height: 100%;
      border: none;
    }

    .editor-panel {
      display: none;
      flex-direction: column;
      width: 50%;
      border-left: 1px solid var(--border);
      background: #fff;
    }

    .editor-panel.active {
      display: flex;
    }

    .editor-header {
      padding: 8px 14px;
      background: rgba(0,0,0,0.02);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .editor-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .status-dot.saved {
      background: #5aaa80;
    }

    .status-dot.unsaved {
      background: #d4a030;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .editor-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .editor-actions {
      display: flex;
      gap: 6px;
    }

    .editor-panel textarea {
      flex: 1;
      background: #fff;
      color: var(--text);
      border: none;
      padding: 18px;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      outline: none;
      tab-size: 2;
      overflow: auto;
    }

    .editor-panel textarea::selection {
      background: rgba(196,149,106,0.2);
    }

    /* ========== VIEW MODES ========== */
    .workspace.split .editor-panel {
      display: flex;
      width: 50%;
    }

    .workspace.editor-only .preview-panel {
      display: none;
    }

    .workspace.editor-only .editor-panel {
      width: 100%;
      display: flex;
    }

    /* ========== EMPTY STATE ========== */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 16px;
    }

    .empty h3 {
      color: var(--text-secondary);
      font-family: 'Noto Serif SC', serif;
      font-size: 1.2rem;
      font-weight: 600;
    }

    /* ========== INFO BAR ========== */
    .info-bar {
      position: fixed;
      bottom: 16px; left: 16px;
      background: rgba(250,249,247,0.88);
      backdrop-filter: blur(16px);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      z-index: 99;
      border: 1px solid var(--border);
      font-weight: 500;
      box-shadow: 0 2px 12px rgba(44,36,32,0.05);
      pointer-events: none;
      letter-spacing: 0.01em;
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      top: 90px; left: 50%;
      transform: translateX(-50%);
      background: rgba(250,249,247,0.95);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 22px;
      border-radius: 20px;
      font-size: 0.84rem;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(44,36,32,0.08);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
      box-shadow: var(--shadow-soft);
    }

    .toast.show {
      opacity: 1;
    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139,119,101,0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139,119,101,0.35);
    }

    /* ========== MOBILE ========== */
    @media (max-width: 768px) {
      .toolbar {
        top: 10px;
        height: 44px;
        padding: 0 6px;
        gap: 2px;
      }
      .toolbar-brand {
        padding: 0 6px 0 2px;
      }
      .toolbar-title {
        display: none;
      }
      .toolbar-badge {
        display: none;
      }
      .toolbar-sep {
        display: none;
      }
      .vbtn {
        width: 26px; height: 26px;
      }
      .tbtn {
        width: 30px; height: 30px;
      }
      .workspace {
        top: 70px;
      }
    }
  </style>
</head>
<body>
  <!-- Floating unified toolbar -->
  <div class="toolbar">
    <!-- Brand: logo + title -->
    <div class="toolbar-brand">
      <div class="toolbar-logo"></div>
      <span class="toolbar-title" id="slideTitle">幻灯片预览</span>
      <span class="toolbar-badge ai" id="aiBadge"></span>
    </div>

    <div class="toolbar-sep"></div>

    <!-- View toggle: three small circles -->
    <div class="view-group">
      <button class="vbtn active" id="viewPreview" onclick="setView('preview')" title="预览">
        <span class="dot" style="display:inline-block;width:5px;height:5px;background:currentColor;border-radius:50%;"></span>
      </button>
      <button class="vbtn" id="viewSplit" onclick="setView('split')" title="分屏">
        <span class="dot" style="display:inline-block;width:5px;height:5px;background:currentColor;border-radius:50%;margin-right:2px;"></span>
        <span class="dot" style="display:inline-block;width:5px;height:5px;background:currentColor;border-radius:50%;"></span>
      </button>
      <button class="vbtn" id="viewEditor" onclick="setView('editor')" title="代码">
        <span class="dot" style="display:inline-block;width:4px;height:4px;background:currentColor;border-radius:50%;margin-right:1px;"></span>
        <span class="dot" style="display:inline-block;width:4px;height:4px;background:currentColor;border-radius:50%;margin-right:1px;"></span>
        <span class="dot" style="display:inline-block;width:4px;height:4px;background:currentColor;border-radius:50%;"></span>
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <!-- Back: ghost circle -->
    <button class="tbtn tbtn-ghost" onclick="goBack()" title="返回">
      <svg class="ti ti-arrow-left" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <!-- Copy: outline circle -->
    <button class="tbtn tbtn-outline" onclick="copyCode()" title="复制代码">
      <svg class="ti" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
    </button>
    <!-- Download: solid accent circle -->
    <button class="tbtn tbtn-solid" onclick="downloadHTML()" title="下载 HTML">
      <svg class="ti ti-arrow-down" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
  </div>

  <div class="workspace" id="workspace">
    <div class="preview-panel" id="previewPanel">
      <div class="empty" id="emptyState">
        <h3>加载中...</h3>
      </div>
    </div>
    <div class="editor-panel" id="editorPanel">
      <div class="editor-header">
        <div class="editor-header-left">
          <span class="status-dot saved" id="statusDot"></span>
          <span class="editor-label">HTML 代码</span>
        </div>
        <div class="editor-actions">
          <button class="toolbar-btn outline" onclick="formatCode()">格式化</button>
          <button class="toolbar-btn solid" onclick="updatePreview()">
            <span class="tarrow tarrow-spin">↻</span> 更新
          </button>
        </div>
      </div>
      <textarea id="codeEditor" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="info-bar" id="infoBar"></div>
  <div class="toast" id="toast"></div>

  <script>
    let slideHTML = '';
    let slideTitle = '未命名幻灯片';
    let isAI = false;
    let currentView = 'preview';
    let autoUpdateTimer = null;
    let hasUnsavedChanges = false;

    function init() {
      const params = new URLSearchParams(window.location.search);
      const sessionKey = params.get('k');
      slideTitle = sessionKey ? (sessionStorage.getItem(sessionKey + '_title') || '未命名幻灯片') : decodeURIComponent(params.get('title') || '未命名幻灯片');
      isAI = params.get('ai') === '1';
      const model = params.get('model') || '';

      document.getElementById('slideTitle').textContent = slideTitle;
      const badgeEl = document.getElementById('aiBadge');
      if (isAI) { badgeEl.textContent = 'AI'; badgeEl.className = 'toolbar-badge ai'; }
      else { badgeEl.textContent = '基础'; badgeEl.className = 'toolbar-badge fallback'; }

      if (sessionKey) {
        slideHTML = sessionStorage.getItem(sessionKey + '_html') || '';
        // 清理 sessionStorage
        sessionStorage.removeItem(sessionKey + '_html');
        sessionStorage.removeItem(sessionKey + '_title');
      } else {
        slideHTML = decodeURIComponent(params.get('html') || '');
      }

      if (!slideHTML || !slideHTML.trim()) {
        document.getElementById('emptyState').innerHTML = `
          <h3>没有可预览的幻灯片</h3>
          <button class="tbtn tbtn-solid" onclick="goBack()" style="margin-top:16px;width:48px;height:48px;">
            <svg viewBox="0 0 24 24" class="ti ti-arrow-left"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>`;
        return;
      }
      document.getElementById('codeEditor').value = slideHTML;
      updatePreview();
      const sectionCount = (slideHTML.match(/<section/g) || []).length;
      document.getElementById('infoBar').textContent = `共 ${sectionCount} 页 · reveal.js v5`;

      const editor = document.getElementById('codeEditor');
      editor.addEventListener('input', () => {
        hasUnsavedChanges = true;
        updateStatus('unsaved');
        clearTimeout(autoUpdateTimer);
        autoUpdateTimer = setTimeout(() => { updatePreview(); updateStatus('saved'); }, 1200);
      });
      document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          updatePreview();
          updateStatus('saved');
          showToast('预览已更新');
        }
      });
    }

    function updatePreview() {
      const editor = document.getElementById('codeEditor');
      slideHTML = editor.value;
      hasUnsavedChanges = false;
      const iframe = document.getElementById('slideFrame');
      if (iframe) { iframe.srcdoc = slideHTML; }
      else {
        const container = document.getElementById('previewPanel');
        container.innerHTML = '';
        const newIframe = document.createElement('iframe');
        newIframe.id = 'slideFrame';
        newIframe.srcdoc = slideHTML;
        container.appendChild(newIframe);
      }
      const sectionCount = (slideHTML.match(/<section/g) || []).length;
      document.getElementById('infoBar').textContent = `共 ${sectionCount} 页 · reveal.js v5`;
    }

    function setView(view) {
      currentView = view;
      const ws = document.getElementById('workspace');
      ws.className = 'workspace';
      ['viewPreview','viewSplit','viewEditor'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById('editorPanel').classList.remove('active');
      switch(view) {
        case 'preview': document.getElementById('viewPreview').classList.add('active'); break;
        case 'split': ws.classList.add('split'); document.getElementById('viewSplit').classList.add('active'); document.getElementById('editorPanel').classList.add('active'); break;
        case 'editor': ws.classList.add('editor-only'); document.getElementById('viewEditor').classList.add('active'); document.getElementById('editorPanel').classList.add('active'); break;
      }
    }

    function updateStatus(status) {
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + status;
    }

    function formatCode() {
      const editor = document.getElementById('codeEditor');
      let code = editor.value;
      const indent = '  ';
      let formatted = '';
      let level = 0;
      const lines = code.replace(/>\s*</g, '>\n<').split('\n');
      lines.forEach(line => {
        line = line.trim();
        if (!line) return;
        if (line.match(/^<\/(section|div|html|head|body|script|style|ul)/i)) level = Math.max(0, level - 1);
        formatted += indent.repeat(level) + line + '\n';
        if (line.match(/^<(section|div|html|head|body|script|style|ul|li)/i) && !line.match(/<\/.*>$/)) level++;
      });
      editor.value = formatted.trim();
      updatePreview();
      showToast('代码已格式化');
    }

    function goBack() { window.location.href = '/'; }
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }
    function downloadHTML() {
      if (!slideHTML) return;
      const blob = new Blob([slideHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (slideTitle.replace(/[^\w\u4e00-\u9fa5]/g, '_') || 'slide') + '.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('HTML 文件已下载');
    }
    function copyCode() {
      const code = document.getElementById('codeEditor').value;
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => showToast('代码已复制到剪贴板')).catch(() => {
        document.getElementById('codeEditor').select();
        document.execCommand('copy');
        showToast('代码已复制到剪贴板');
      });
    }

    init();
  </script>
</body>
</html>
